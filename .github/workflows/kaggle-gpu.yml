name: kaggle-gpu-sweep

# The free GPU lane: GitHub Actions conducts, Kaggle's free GPU computes.
# Modes:
#   (scheduled / default)  push kernel -> poll -> retrieve -> commit
#   mode=retrieve          skip the GPU run; just fetch the latest kernel
#                          output and commit it (recovery / re-publish)

on:
  schedule:
    - cron: "0 4 */3 * *"          # every 3 days at 04:00 UTC
  workflow_dispatch:
    inputs:
      model:
        description: "Audit a single model id on GPU (optional)"
        required: false
      mode:
        description: "sweep (default) or retrieve (skip GPU, fetch last results)"
        required: false
        default: "sweep"

permissions:
  contents: write

concurrency:
  group: kaggle-sweep
  cancel-in-progress: false

jobs:
  gpu-sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    env:
      KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
      KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
      KERNEL: ${{ secrets.KAGGLE_USERNAME }}/contamination-watch-sweep
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Kaggle CLI
        run: pip install -U kaggle

      - name: Prepare kernel
        if: ${{ inputs.mode != 'retrieve' }}
        run: |
          sed -i "s/KAGGLE_USERNAME/${KAGGLE_USERNAME}/" infra/kaggle/kernel-metadata.json
          if [ -n "${{ inputs.model }}" ]; then
            sed -i 's|os.environ.get("CW_SINGLE_MODEL", "")|os.environ.get("CW_SINGLE_MODEL", "${{ inputs.model }}")|' infra/kaggle/sweep_kernel.py
          fi

      - name: Launch GPU kernel
        if: ${{ inputs.mode != 'retrieve' }}
        run: kaggle kernels push -p infra/kaggle

      - name: Wait for completion
        if: ${{ inputs.mode != 'retrieve' }}
        run: |
          for i in $(seq 1 160); do
            sleep 120
            STATUS=$(kaggle kernels status "$KERNEL" 2>&1 || true)
            S=$(echo "$STATUS" | tr '[:upper:]' '[:lower:]')
            echo "[$i] $STATUS"
            case "$S" in
              *complete*) echo "kernel complete"; exit 0 ;;
              *error*|*cancel*) echo "kernel failed"; exit 1 ;;
            esac
          done
          echo "timed out"; exit 1

      - name: Retrieve results
        run: |
          kaggle kernels output "$KERNEL" -p /tmp/kout
          ls -la /tmp/kout
          test -f /tmp/kout/watch.sqlite3 || { echo "no results in kernel output"; exit 1; }
          mkdir -p data site
          cp /tmp/kout/watch.sqlite3 data/watch.sqlite3
          cp /tmp/kout/results.json site/results.json

      - name: Rebuild site
        run: |
          pip install -e . --quiet
          contamination-watch build

      - name: Commit results
        run: |
          git config user.name "contamination-watch[bot]"
          git config user.email "bot@users.noreply.github.com"
          git checkout -- infra/kaggle
          git add data/ site/
          git diff --cached --quiet || git commit -m "gpu sweep (kaggle): $(date -u +%FT%TZ)"
          git push
